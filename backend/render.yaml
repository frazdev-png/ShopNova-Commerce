services:
  - type: web
    name: shopnova-api
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://shop-nova-commerce.vercel.app"
      - key: APP_DEBUG
        value: "false"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS
        value: "120"
      - key: RATE_LIMIT_LOGIN_REQUESTS
        value: "10"
      - key: CLOUDINARY_CLOUD_NAME
        value: jrowsl81
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: ecommerce
